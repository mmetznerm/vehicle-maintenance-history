server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /actuator/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /config.js {
        add_header Cache-Control "no-store";
        try_files /config.js =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
