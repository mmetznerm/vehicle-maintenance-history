spring:
  application:
    name: vehicle-history-event-worker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/vehicle-history}
    username: ${SPRING_DATASOURCE_USERNAME:vehicle-history}
    password: ${SPRING_DATASOURCE_PASSWORD:vehicle-history}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:vehicle-public-history-v1}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: record

server:
  port: ${SERVER_PORT:8081}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  kafka:
    topic: ${KAFKA_VEHICLE_MAINTENANCE_TOPIC:vehicle-maintenance-events.v1}
    consumer-group: ${SPRING_KAFKA_CONSUMER_GROUP_ID:vehicle-public-history-v1}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080}
