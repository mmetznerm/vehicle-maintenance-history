spring:
  application:
    name: maintenance-consistency-worker
  main:
    web-application-type: servlet
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/maintenance-consistency}
    username: ${SPRING_DATASOURCE_USERNAME:maintenance-consistency}
    password: ${SPRING_DATASOURCE_PASSWORD:maintenance-consistency}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: record

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  kafka:
    input-topic: ${KAFKA_VEHICLE_MAINTENANCE_TOPIC:vehicle-maintenance-events.v1}
    output-topic: ${KAFKA_MAINTENANCE_ALERT_TOPIC:maintenance-inconsistency-alerts.v1}
    consumer-group: ${SPRING_KAFKA_CONSUMER_GROUP_ID:maintenance-consistency-v1}
    output-partitions: ${KAFKA_MAINTENANCE_ALERT_PARTITIONS:3}
    outbox:
      enabled: ${KAFKA_OUTBOX_ENABLED:true}
      poll-interval: ${KAFKA_OUTBOX_POLL_INTERVAL:1s}
      batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:50}
      max-attempts: ${KAFKA_OUTBOX_MAX_ATTEMPTS:10}
      publish-timeout: ${KAFKA_OUTBOX_PUBLISH_TIMEOUT:10s}
