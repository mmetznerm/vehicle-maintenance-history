spring:
  application:
    name: vehicle-maintenance-history

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vehicle-maintenance-history}
    username: ${SPRING_DATASOURCE_USERNAME:vehicle-maintenance-history}
    password: ${SPRING_DATASOURCE_PASSWORD:vehicle-maintenance-history}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:vehicle-maintenance-history}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: vehicle-maintenance-history
    description: API for vehicle maintenance history.
    version: 0.0.1-SNAPSHOT

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

app:
  security:
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        - http://localhost:5174
        - http://127.0.0.1:5174

  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-before-production-123456789}
    access-token-ttl: 15m
    refresh-token-ttl: 30d
