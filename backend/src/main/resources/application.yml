spring:
  application:
    name: vehicle-maintenance-history

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vehicle-maintenance-history}
    username: ${SPRING_DATASOURCE_USERNAME:vehicle-maintenance-history}
    password: ${SPRING_DATASOURCE_PASSWORD:vehicle-maintenance-history}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    admin:
      auto-create: true
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:vehicle-maintenance-history}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: record

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: vehicle-maintenance-history
    description: API for vehicle maintenance history.
    version: 0.0.1-SNAPSHOT

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

app:
  kafka:
    topic:
      name: ${KAFKA_VEHICLE_MAINTENANCE_TOPIC:vehicle-maintenance-events.v1}
      partitions: ${KAFKA_VEHICLE_MAINTENANCE_PARTITIONS:3}
      replication-factor: ${KAFKA_VEHICLE_MAINTENANCE_REPLICATION_FACTOR:1}
    alert-topic:
      name: ${KAFKA_MAINTENANCE_ALERT_TOPIC:maintenance-inconsistency-alerts.v1}
      partitions: ${KAFKA_MAINTENANCE_ALERT_PARTITIONS:3}
      replication-factor: ${KAFKA_MAINTENANCE_ALERT_REPLICATION_FACTOR:1}
      consumer-group: ${KAFKA_MAINTENANCE_ALERT_CONSUMER_GROUP:vehicle-maintenance-alerts-v1}
    outbox:
      poll-interval: ${KAFKA_OUTBOX_POLL_INTERVAL:1s}
      batch-size: ${KAFKA_OUTBOX_BATCH_SIZE:50}
      max-attempts: ${KAFKA_OUTBOX_MAX_ATTEMPTS:10}
      publish-timeout: ${KAFKA_OUTBOX_PUBLISH_TIMEOUT:10s}

  security:
    cors:
      allowed-origins:
        - http://localhost:5173
        - http://127.0.0.1:5173
        - http://localhost:5174
        - http://127.0.0.1:5174

  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-before-production-123456789}
    access-token-ttl: 15m
    refresh-token-ttl: 30d
