apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autolog.backendName" . }}
  labels:
    {{- include "autolog.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "autolog.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "autolog.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "autolog.backendName" . }}-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "autolog.backendSecretName" . }}
                  key: {{ .Values.backend.secrets.datasourceUsernameKey }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "autolog.backendSecretName" . }}
                  key: {{ .Values.backend.secrets.datasourcePasswordKey }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "autolog.backendSecretName" . }}
                  key: {{ .Values.backend.secrets.jwtSecretKey }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
