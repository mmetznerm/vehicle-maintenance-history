apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "autolog.frontendName" . }}
  labels:
    {{- include "autolog.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "autolog.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "autolog.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: {{ .Values.frontend.env.apiBaseUrl | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.probes.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.frontend.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.frontend.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.frontend.probes.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.probes.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.frontend.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.frontend.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.frontend.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
