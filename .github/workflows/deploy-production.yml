name: Deploy production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy, usually a commit SHA already deployed to stage.
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: autolog-backend
  FRONTEND_ECR_REPOSITORY: autolog-frontend
  HELM_RELEASE: vehicle-maintenance-history
  K8S_NAMESPACE: autolog-prod

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Deploy production with Helm
        run: |
          helm upgrade --install "$HELM_RELEASE" deploy/helm/autolog \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f deploy/helm/autolog/values-prod.yaml \
            --set-string backend.image.repository="${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}" \
            --set-string backend.image.tag="${{ inputs.image_tag }}" \
            --set-string frontend.image.repository="${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}" \
            --set-string frontend.image.tag="${{ inputs.image_tag }}" \
            --set-string backend.env.datasourceUrl="${{ vars.PROD_SPRING_DATASOURCE_URL }}"
