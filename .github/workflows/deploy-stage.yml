name: Deploy stage

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: autolog-backend
  FRONTEND_ECR_REPOSITORY: autolog-frontend
  HELM_RELEASE: vehicle-maintenance-history
  K8S_NAMESPACE: autolog-stage

jobs:
  stage-configuration:
    name: Check stage deployment configuration
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}

    steps:
      - name: Check required GitHub variables
        id: check
        env:
          AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
          STAGE_SPRING_DATASOURCE_URL: ${{ vars.STAGE_SPRING_DATASOURCE_URL }}
        run: |
          if [ -n "$AWS_GITHUB_ACTIONS_ROLE_ARN" ] && [ -n "$EKS_CLUSTER_NAME" ] && [ -n "$STAGE_SPRING_DATASOURCE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Stage deployment skipped because AWS/EKS/RDS GitHub variables are not configured yet."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  build-push-deploy:
    name: Build, push and deploy stage
    runs-on: ubuntu-latest
    environment: stage
    needs: stage-configuration
    if: needs.stage-configuration.outputs.configured == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Deploy stage with Helm
        run: |
          helm upgrade --install "$HELM_RELEASE" deploy/helm/autolog \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f deploy/helm/autolog/values-stage.yaml \
            --set-string backend.image.repository="${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}" \
            --set-string backend.image.tag="${{ github.sha }}" \
            --set-string frontend.image.repository="${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}" \
            --set-string frontend.image.tag="${{ github.sha }}" \
            --set-string backend.env.datasourceUrl="${{ vars.STAGE_SPRING_DATASOURCE_URL }}"
