name: Deploy demo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  BACKEND_ECR_REPOSITORY: autolog-backend
  FRONTEND_ECR_REPOSITORY: autolog-frontend
  HELM_RELEASE: vehicle-maintenance-history
  K8S_NAMESPACE: autolog-demo

jobs:
  demo-configuration:
    name: Check demo deployment configuration
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}

    steps:
      - name: Check required GitHub variables
        id: check
        env:
          AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
          DEMO_SPRING_DATASOURCE_URL: ${{ vars.DEMO_SPRING_DATASOURCE_URL }}
        run: |
          if [ -n "$AWS_GITHUB_ACTIONS_ROLE_ARN" ] && [ -n "$EKS_CLUSTER_NAME" ] && [ -n "$DEMO_SPRING_DATASOURCE_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Demo deployment skipped because AWS/EKS/RDS GitHub variables are not configured yet."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  build-push-deploy:
    name: Build, push and deploy demo
    runs-on: ubuntu-latest
    environment: demo
    needs: demo-configuration
    if: needs.demo-configuration.outputs.configured == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend unit and integration tests
        run: |
          chmod +x ./mvnw
          ./mvnw verify -Pintegration-tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}:demo

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}:demo

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Deploy demo with Helm
        run: |
          helm upgrade --install "$HELM_RELEASE" deploy/helm/autolog \
            --namespace "$K8S_NAMESPACE" \
            --create-namespace \
            -f deploy/helm/autolog/values-demo.yaml \
            --set-string backend.image.repository="${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_ECR_REPOSITORY }}" \
            --set-string backend.image.tag="${{ github.sha }}" \
            --set-string frontend.image.repository="${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_ECR_REPOSITORY }}" \
            --set-string frontend.image.tag="${{ github.sha }}" \
            --set-string backend.env.datasourceUrl="${{ vars.DEMO_SPRING_DATASOURCE_URL }}"
