version: 2
updates:
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns:
          - org.springframework*
          - org.springdoc*
      testcontainers:
        patterns:
          - org.testcontainers*

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - react
          - react-dom
          - "@types/react*"
      vite-vitest:
        patterns:
          - vite
          - vitest
          - "@vitejs/*"
          - "@vitest/*"

  - package-ecosystem: maven
    directory: /event-worker
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      spring:
        patterns:
          - org.springframework*
          - org.springdoc*
      testcontainers:
        patterns:
          - org.testcontainers*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
