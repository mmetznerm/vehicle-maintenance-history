spring:
  application:
    name: vehicle-maintenance-history

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vehicle-maintenance-history}
    username: ${SPRING_DATASOURCE_USERNAME:vehicle-maintenance-history}
    password: ${SPRING_DATASOURCE_PASSWORD:vehicle-maintenance-history}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info