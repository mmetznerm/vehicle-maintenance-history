services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: vehicle-maintenance-history-api
    profiles:
      - app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vehicle-maintenance-history
      SPRING_DATASOURCE_USERNAME: vehicle-maintenance-history
      SPRING_DATASOURCE_PASSWORD: vehicle-maintenance-history
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-key-change-before-production-123456789}
      APP_SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8080/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  event-worker:
    build:
      context: .
      dockerfile: event-worker/Dockerfile
    container_name: vehicle-maintenance-history-event-worker
    profiles:
      - app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://history-postgres:5432/vehicle-history
      SPRING_DATASOURCE_USERNAME: vehicle-history
      SPRING_DATASOURCE_PASSWORD: vehicle-history
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
    ports:
      - "8081:8081"
    depends_on:
      history-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8081/actuator/health/readiness > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: vehicle-maintenance-history-postgres
    environment:
      POSTGRES_DB: vehicle-maintenance-history
      POSTGRES_USER: vehicle-maintenance-history
      POSTGRES_PASSWORD: vehicle-maintenance-history
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vehicle-maintenance-history -d vehicle-maintenance-history
      interval: 10s
      timeout: 5s
      retries: 5

  history-postgres:
    image: postgres:16-alpine
    container_name: vehicle-maintenance-history-projection-postgres
    environment:
      POSTGRES_DB: vehicle-history
      POSTGRES_USER: vehicle-history
      POSTGRES_PASSWORD: vehicle-history
    ports:
      - "5433:5432"
    volumes:
      - history_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vehicle-history -d vehicle-history
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.9.1
    container_name: vehicle-maintenance-history-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  history_postgres_data:
  kafka_data:
