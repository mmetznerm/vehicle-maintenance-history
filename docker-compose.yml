services:
  app:
    build:
      context: .
    container_name: vehicle-maintenance-history-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vehicle-maintenance-history
      SPRING_DATASOURCE_USERNAME: vehicle-maintenance-history
      SPRING_DATASOURCE_PASSWORD: vehicle-maintenance-history
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-key-change-before-production-123456789}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:8080/actuator/health > /dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: node:24-alpine
    container_name: vehicle-maintenance-history-frontend
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://app:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: vehicle-maintenance-history-postgres
    environment:
      POSTGRES_DB: vehicle-maintenance-history
      POSTGRES_USER: vehicle-maintenance-history
      POSTGRES_PASSWORD: vehicle-maintenance-history
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vehicle-maintenance-history -d vehicle-maintenance-history
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  frontend_node_modules:
